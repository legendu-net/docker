name: Build Docker Images
on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 13 * *'
  push:
    branches:
      - main
      - dev
jobs:
  build_docker_images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/heads/dev
          fetch-depth: 0
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sudo env UV_INSTALL_DIR="/usr/local/bin" sh
      - name: Store Docker Images on /mnt/docker
        run: |
          curl -sSL https://raw.githubusercontent.com/legendu-net/github_actions_scripts/main/config_docker.py \
            | uv run --script -
      - name: Show Docker Images Before Building
        run: docker images
      - name: Build Docker Images
        run: |
          curl -sSL https://raw.githubusercontent.com/legendu-net/github_actions_scripts/main/build_images.py \
            | uv run --script - \
            --commit1 "${{ github.event.before }}" \
            --commit2 "${{ github.event.after }}"
      - name: Show Docker Images Aftering Building
        run: docker images
