name: Update Versions of Tools
on:
  schedule:
    - cron: '0 2 * * *'
jobs:
  update-versions-of-tools:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Update the Version of code-server
        run: |
          curl -sSL https://raw.githubusercontent.com/legendu-net/github_actions_scripts/main/update_version_dockerfile.py \
            | uv run --script - \
            --dockerfile docker-vscode-server/Dockerfile \
            --repo coder/code-server \
            --token ${{ secrets.GITHUBACTIONS }}
      - name: Update the Version of JupyterLab
        run: |
          curl -sSL https://raw.githubusercontent.com/legendu-net/github_actions_scripts/main/update_version_dockerfile.py \
            | uv run --script - \
            --dockerfile docker-jupyterlab/Dockerfile \
            --repo jupyterlab/jupyterlab \
            --token ${{ secrets.GITHUBACTIONS }}
      - name: Update the Version of icon
        run: |
          curl -sSL https://raw.githubusercontent.com/legendu-net/github_actions_scripts/main/update_version_dockerfile.py \
            | uv run --script - \
            --repo legendu-net/icon \
            --repo jupyterlab/jupyterlab \
            --token ${{ secrets.GITHUBACTIONS }}

