name: Update the Version of icon
on:
  schedule:
    - cron: '0 2 * * *'
jobs:
  update-version-icon:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Update the Version of icon
        run: |
          curl -sSL https://raw.githubusercontent.com/legendu-net/github_actions_scripts/main/docker/update_version_dockerfile.py \
            | uv run --script - \
            --dockerfile docker-base/Dockerfile \
            --repo legendu-net/icon \
            --token ${{ secrets.GITHUBACTIONS }}

